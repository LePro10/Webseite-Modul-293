<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Booking | Reservierung</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="header-inner">
        <h1>Reservierung</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="formular.html">Buchung</a>
        </nav>
      </div>
    </header>

    <main>
      <article class="booking">
        <h2>Jetzt buchen</h2>
        <form
          action="https://gibm.becknet.ch/formular/formular.php"
          method="post"
        >
          <fieldset>
            <legend>Kontakt</legend>

            <label for="firstname">Vorname</label>
            <input
              type="text"
              id="firstname"
              name="firstname"
              placeholder="Max"
              required
              pattern="[A-Za-zÄÖÜäöüß\s]+"
              maxlength="30"
            />

            <label for="email">E-Mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="max@beispiel.de"
              required
            />

            <label for="phone">Telefon</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="+49 170 1234567"
              pattern="^\+?[0-9\s\-]{7,20}$"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Aufenthalt</legend>

            <label for="arrival">Anreisedatum</label>
            <input
              type="date"
              id="arrival"
              name="arrival"
              required
              value="2026-04-01"
              min="2026-04-01"
            />

            <label for="departure">Abreisedatum</label>
            <input
              type="date"
              id="departure"
              name="departure"
              required
              value="2026-04-05"
              min="2026-04-02"
            />

            <label for="guests">Gäste</label>
            <input
              type="number"
              id="guests"
              name="guests"
              min="1"
              max="6"
              value="2"
              required
            />
          </fieldset>

          <div class="form-actions">
            <button type="submit">Anfrage senden</button>
          </div>
        </form>
      </article>
    </main>
  </body>
</html>
