<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Booking | Reservierung</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Reservierung</h1>
    <nav aria-label="Sekundäre Navigation">
      <a href="index.html">Zurück zur Übersicht</a>
    </nav>
  </header>

  <main>
    <article class="booking">
      <h2>Jetzt buchen</h2>
      <form action="https://gibm.becknet.ch/formular/formular.php" method="post">
        <fieldset>
          <legend>Kontakt</legend>

          <label for="firstname">Vorname</label>
          <input
            type="text"
            id="firstname"
            name="firstname"
            placeholder="Max"
            required
            pattern="[A-Za-zÄÖÜäöüß\s]+"
            maxlength="30"
            size="30"
            autofocus
          >

          <label for="lastname">Nachname</label>
          <input
            type="text"
            id="lastname"
            name="lastname"
            placeholder="Mustermann"
            required
            pattern="[A-Za-zÄÖÜäöüß\s]+"
            maxlength="30"
            size="30"
          >

          <label for="email">E-Mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="max@beispiel.de"
            required
            size="30"
          >

          <label for="phone">Telefon</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+49 170 1234567"
            pattern="^\+?[0-9\s\-]{7,20}$"
            minlength="7"
            maxlength="20"
            required
          >
        </fieldset>

        <fieldset>
          <legend>Aufenthalt</legend>

          <label for="arrival">Anreisedatum</label>
          <input
            type="date"
            id="arrival"
            name="arrival"
            required
            value="2026-04-01"
            min="2026-04-01"
          >

          <label for="departure">Abreisedatum</label>
          <input
            type="date"
            id="departure"
            name="departure"
            required
            value="2026-04-05"
            min="2026-04-02"
          >

          <label for="guests">Gäste</label>
          <input
            type="number"
            id="guests"
            name="guests"
            min="1"
            max="6"
            value="2"
            required
          >

          <fieldset>
            <legend>Zimmerkategorie</legend>
            <label><input type="radio" name="room" value="standard" checked required> Standard</label>
            <label><input type="radio" name="room" value="suite" required> Suite</label>
            <label><input type="radio" name="room" value="penthouse" required> Penthouse</label>
          </fieldset>

          <label for="view">Aussicht</label>
          <select id="view" name="view" required>
            <option value="">Bitte wählen</option>
            <option value="stadt">Stadt</option>
            <option value="berg">Berge</option>
            <option value="meer">Meer</option>
          </select>

          <label for="promo">Promocode</label>
          <input
            type="text"
            id="promo"
            name="promo"
            placeholder="SUMMER2026"
            maxlength="10"
            size="20"
          >
        </fieldset>

        <fieldset>
          <legend>Sicherheit & Extras</legend>

          <label for="password">Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mind. 8 Zeichen"
            minlength="8"
            maxlength="20"
            required
          >

          <label><input type="checkbox" name="newsletter" value="yes"> Newsletter erhalten</label>
          <label><input type="checkbox" name="terms" value="accepted" required> Ich habe die AGB gelesen</label>

          <label for="reference">Buchungsreferenz</label>
          <input
            type="text"
            id="reference"
            name="reference"
            value="HOTEL-2026-0001"
            readonly
          >

          <label for="note">Wunsch / Notiz</label>
          <input
            type="text"
            id="note"
            name="note"
            placeholder="z. B. Allergie, frühe Anreise"
            disabled
          >
        </fieldset>

        <div class="form-actions">
          <button type="submit">Anfrage senden</button>
          <button type="reset" disabled>Zurücksetzen (deaktiviert)</button>
        </div>
      </form>
    </article>
  </main>

  <footer>
    <p>&copy; 2026 Hotel Booking</p>
  </footer>
</body>

</html>
